name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🟦 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.4

      - name: 📦 Install dependencies
        run: bun install

      - name: 🧹 Type check
        run: bun run lint

      - name: 🏗️ Build
        run: bun run build

  publish:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4
      - name: 🟦 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.4
      - name: 📗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: 📦 Install dependencies
        run: bun install
      - name: Create Release / Publish
        uses: changesets/action@v1
        with:
          publish: bun run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
